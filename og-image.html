<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>OG Image — happyapps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 627px;
      overflow: hidden;
      background: #f8f7f5;
      font-family: 'Lora', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 1200px;
      height: 627px;
      display: grid;
      grid-template-columns: 1fr 6px;
    }

    /* ── LEFT: content ── */
    .content {
      padding: 64px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .site-label {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: #2d4a7a;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .site-label::after {
      content: '';
      flex: 0 0 48px;
      height: 1px;
      background: #2d4a7a;
      opacity: 0.4;
    }

    h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-weight: 700;
      font-size: 52px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #1a1814;
    }

    h1 em {
      font-style: italic;
      color: #2d4a7a;
    }

    .tagline {
      font-family: 'Lora', Georgia, serif;
      font-size: 20px;
      font-style: italic;
      line-height: 1.6;
      color: #3d3a35;
      max-width: 680px;
    }

    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 32px;
      border-top: 1px solid #dedad4;
    }

    .url {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: #6b6760;
    }

    .topics {
      display: flex;
      gap: 10px;
    }

    .chip {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2d4a7a;
      background: #e8edf5;
      padding: 4px 10px;
      border-radius: 2px;
    }

    /* ── RIGHT: accent bar ── */
    .accent-bar {
      background: #2d4a7a;
      width: 6px;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="content">
      <div class="top">
        <span class="site-label">happyapps</span>
        <h1>Product, Business<br>&amp; Engineering <em>Intelligence</em></h1>
        <p class="tagline">Writing at the intersection of humans, systems, and business.</p>
      </div>
      <div class="bottom">
        <span class="url">jsooriah.github.io/happyapps</span>
        <div class="topics">
          <span class="chip">Product</span>
          <span class="chip">AI Engineering</span>
          <span class="chip">Agile</span>
          <span class="chip">JTBD</span>
        </div>
      </div>
    </div>
    <div class="accent-bar"></div>
  </div>
</body>
</html>
